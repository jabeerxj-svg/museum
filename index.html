<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل بيانات التواصل</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.1/build/css/intlTelInput.css">

<style>
* {
  box-sizing: border-box;
}

:root {
  --green: #0b6b57;
  --green-light: #0fa984;
  --gold: #c49a54;
  --white: #ffffff;
  --muted: rgba(255,255,255,.75);
  --input-bg: rgba(4, 6, 6, .74);
  --input-border: rgba(196,154,84,.82);
}

html, body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, Tahoma, sans-serif;
  color: var(--white);
}

body {
  background:
    linear-gradient(90deg, rgba(0,0,0,.82), rgba(0,0,0,.42), rgba(0,0,0,.82)),
    linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.78)),
    url("museum-bg.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
}

.page {
  position: relative;
  width: min(100%, 1060px);
  min-height: 690px;
  padding: 24px 46px 30px;
  border-radius: 34px;
  background: rgba(0, 0, 0, .36);
  border: 1px solid rgba(196,154,84,.38);
  box-shadow: 0 25px 80px rgba(0,0,0,.50);
  overflow: hidden;
  backdrop-filter: blur(2px);
}

.page::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 0%, rgba(15,169,132,.16), transparent 28%),
    radial-gradient(circle at 50% 100%, rgba(196,154,84,.12), transparent 36%);
  pointer-events: none;
}

.top {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: flex-start;
  margin-bottom: 0;
}

html[dir="ltr"] .top {
  justify-content: flex-end;
}

.lang-buttons {
  display: flex;
  gap: 8px;
  padding: 7px;
  border-radius: 999px;
  background: rgba(0,0,0,.52);
  border: 1px solid rgba(255,255,255,.18);
  box-shadow: 0 10px 28px rgba(0,0,0,.28);
}

.lang-buttons button {
  border: 0;
  border-radius: 999px;
  padding: 10px 23px;
  background: transparent;
  color: rgba(255,255,255,.92);
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
}

.lang-buttons button.active {
  background: linear-gradient(135deg, var(--green-light), var(--green));
  color: #fff;
  box-shadow: 0 8px 20px rgba(0,0,0,.32);
}

.header {
  position: relative;
  z-index: 2;
  text-align: center;
  margin-top: 2px;
}

.museum-logo {
  width: 250px;
  max-width: 72%;
  display: block;
  margin: 0 auto 10px;
  filter: drop-shadow(0 10px 22px rgba(0,0,0,.48));
}

.title-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.title-line {
  width: 86px;
  height: 1px;
  background: linear-gradient(to left, transparent, var(--gold), transparent);
}

.title-mark {
  color: var(--gold);
  font-size: 22px;
}

h1 {
  font-size: 50px;
  line-height: 1.1;
  margin: 0;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 10px 28px rgba(0,0,0,.55);
}

.subtitle {
  margin: 8px 0 24px;
  font-size: 27px;
  color: rgba(255,255,255,.80);
  text-shadow: 0 8px 20px rgba(0,0,0,.35);
}

.form {
  position: relative;
  z-index: 2;
  width: min(100%, 710px);
  margin: 0 auto;
}

.field {
  margin-bottom: 18px;
}

label {
  display: flex;
  align-items: center;
  gap: 10px;
  text-align: start;
  font-size: 22px;
  font-weight: 900;
  color: #fff;
  margin-bottom: 8px;
}

.label-icon {
  color: var(--gold);
  font-size: 22px;
}

input {
  width: 100%;
  height: 70px;
  border-radius: 17px;
  border: 1.8px solid var(--input-border);
  background: var(--input-bg);
  color: #fff;
  font-size: 24px;
  padding: 0 22px;
  outline: none;
  direction: ltr;
  text-align: left;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 10px 25px rgba(0,0,0,.24);
}

input::placeholder {
  color: rgba(255,255,255,.45);
}

input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 5px rgba(196,154,84,.16), 0 10px 25px rgba(0,0,0,.24);
}

.iti {
  width: 100%;
  direction: ltr;
}

.iti input {
  width: 100%;
}

.iti__selected-dial-code {
  color: #fff;
  font-size: 17px;
}

.iti__arrow {
  border-top-color: #fff;
}

.iti__country-list {
  direction: ltr;
  text-align: left;
  font-size: 16px;
  color: #111;
  border-radius: 14px;
  overflow: hidden;
}

.note {
  margin-top: 7px;
  font-size: 14px;
  color: rgba(255,255,255,.66);
  text-align: start;
}

.submit {
  width: 100%;
  height: 74px;
  margin-top: 18px;
  border: none;
  border-radius: 21px;
  background: linear-gradient(135deg, var(--green-light), var(--green), #06443a);
  color: #fff;
  font-size: 27px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 18px 36px rgba(0,0,0,.38), inset 0 0 0 1px rgba(255,255,255,.12);
  transition: .2s;
}

.submit:hover {
  transform: translateY(-1px);
}

.submit:disabled {
  opacity: .65;
  cursor: not-allowed;
  transform: none;
}

#msg {
  position: relative;
  z-index: 2;
  margin-top: 14px;
  min-height: 28px;
  font-size: 21px;
  font-weight: 900;
  text-align: center;
}

.success { color: #66e5b7; }
.error { color: #ff7676; }

.promo-note {
  position: relative;
  z-index: 2;
  width: min(100%, 710px);
  margin: 12px auto 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: #f1d59b;
  font-size: 20px;
  font-weight: 800;
  text-align: center;
}

.promo-icon {
  color: var(--gold);
  font-size: 24px;
}

.privacy-note {
  position: relative;
  z-index: 2;
  width: min(100%, 710px);
  margin: 9px auto 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  color: rgba(255,255,255,.72);
  font-size: 15px;
  text-align: center;
}

.lock-icon {
  color: var(--gold);
}

@media (max-width: 760px) {
  body {
    padding: 8px;
    align-items: flex-start;
  }

  .page {
    min-height: auto;
    padding: 16px 16px 24px;
    border-radius: 24px;
  }

  .top {
    justify-content: center;
  }

  .museum-logo {
    width: 205px;
    margin-bottom: 8px;
  }

  .title-line {
    width: 42px;
  }

  .title-mark {
    font-size: 17px;
  }

  h1 {
    font-size: 38px;
  }

  .subtitle {
    font-size: 21px;
    margin-bottom: 18px;
  }

  label {
    font-size: 19px;
  }

  input {
    height: 62px;
    font-size: 20px;
  }

  .submit {
    height: 66px;
    font-size: 23px;
  }

  .promo-note {
    font-size: 16px;
  }

  .privacy-note {
    font-size: 13px;
  }
}

/* ===== Stable layout fix: keep English mode centered ===== */
html,
html[dir="rtl"],
html[dir="ltr"] {
  direction: rtl !important;
}

body {
  overflow-x: hidden !important;
}

.page {
  margin-left: auto !important;
  margin-right: auto !important;
  overflow: hidden !important;
}

.header,
.title-wrap,
.form,
.promo-note,
.privacy-note,
#msg {
  transform: none !important;
  left: auto !important;
  right: auto !important;
  margin-left: auto !important;
  margin-right: auto !important;
}

.top,
html[dir="ltr"] .top,
html[dir="rtl"] .top {
  justify-content: center !important;
}

label,
html[dir="ltr"] label,
html[dir="rtl"] label {
  text-align: right !important;
  justify-content: flex-start !important;
}

input {
  direction: ltr !important;
  text-align: left !important;
}

.iti {
  width: 100% !important;
  direction: ltr !important;
}

.iti input {
  width: 100% !important;
}

.iti__country-list,
.iti__dropdown-content {
  direction: ltr !important;
  text-align: left !important;
  left: 0 !important;
  right: auto !important;
  width: min(610px, calc(100vw - 60px)) !important;
  max-width: min(610px, calc(100vw - 60px)) !important;
  min-width: 300px !important;
  z-index: 999999 !important;
  box-sizing: border-box !important;
}

.iti__search-input {
  width: 100% !important;
  max-width: 100% !important;
  box-sizing: border-box !important;
}


/* ===== Final dropdown behavior fixes ===== */
.top,
html[dir="rtl"] .top,
html[dir="ltr"] .top {
  justify-content: flex-start !important;
}

body.country-dropdown-open .promo-note,
body.country-dropdown-open .privacy-note {
  opacity: 0 !important;
  visibility: hidden !important;
  pointer-events: none !important;
}

body.country-dropdown-open .submit {
  opacity: .25 !important;
}

</style>
</head>

<body>

<div class="page">
  <div class="top">
    <div class="lang-buttons">
      <button id="enBtn" onclick="setLanguage('en')">English</button>
      <button id="arBtn" onclick="setLanguage('ar')">العربية</button>
    </div>
  </div>

  <div class="header">
    <img class="museum-logo" src="https://tickets.asc.sa/storage/uploads/7qwP94FcoVHxdwkmKlHDsjCEwLdebQnCC94Z2lMG.png" alt="Museum Logo">

    <div class="title-wrap">
      <span class="title-line"></span>
      <span class="title-mark">✦</span>
      <h1 id="title">مرحباً بك</h1>
      <span class="title-mark">✦</span>
      <span class="title-line"></span>
    </div>

    <div class="subtitle" id="subtitle">الرجاء إدخال بيانات التواصل</div>
  </div>

  <form class="form" id="customerForm">
    <div class="field">
      <label id="emailLabel" for="email"><span class="label-icon">✉</span> البريد الإلكتروني</label>
      <input id="email" type="email" placeholder="example@email.com" autocomplete="email" required>
    </div>

    <div class="field">
      <label id="phoneLabel" for="phone"><span class="label-icon">☎</span> رقم الجوال</label>
      <input id="phone" type="tel" autocomplete="tel" required>
      <div class="note" id="phoneNote">اختر الدولة ثم أدخل رقم الجوال بدون مفتاح الدولة</div>
    </div>

    <button class="submit" id="submitBtn" type="submit">متابعة</button>
  </form>

  <div id="msg"></div>

  <div class="promo-note" id="promoNote">
    <span class="promo-icon">📣</span>
    <span>لغرض الترويج والإعلانات والعروض</span>
  </div>

  <div class="privacy-note" id="privacyNote">
    <span class="lock-icon">🔒</span>
    <span>بياناتك آمنة ولن يتم مشاركتها مع أي جهة خارجية</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.1/build/js/intlTelInput.min.js"></script>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz7Zvz79-CgU13kqZmN2ypnG1u9506HMWJP6NViA_KGFyvZwvpo8E56M2QnaElFIiI/exec";
let currentLanguage = localStorage.getItem("customer_form_lang") || "ar";

const t = {
  ar: {
    dir: "rtl",
    lang: "ar",
    title: "مرحباً بك",
    subtitle: "الرجاء إدخال بيانات التواصل",
    emailLabel: "البريد الإلكتروني",
    phoneLabel: "رقم الجوال",
    phoneNote: "اختر الدولة ثم أدخل رقم الجوال بدون مفتاح الدولة",
    promoNote: "لغرض الترويج والإعلانات والعروض",
    privacyNote: "بياناتك آمنة ولن يتم مشاركتها مع أي جهة خارجية",
    button: "متابعة",
    sending: "جاري الإرسال...",
    success: "تم تسجيل البيانات بنجاح",
    empty: "الرجاء إدخال البريد الإلكتروني ورقم الجوال",
    invalidEmail: "الرجاء إدخال بريد إلكتروني صحيح",
    invalidPhone: "رقم الجوال يجب أن يكون أرقام فقط ومن 6 إلى 15 رقم",
    error: "حدث خطأ، حاول مرة أخرى"
  },
  en: {
    dir: "ltr",
    lang: "en",
    title: "Welcome",
    subtitle: "Please enter your contact details",
    emailLabel: "Email Address",
    phoneLabel: "Phone Number",
    phoneNote: "Select the country, then enter the phone number without the country code",
    promoNote: "For promotions, announcements, and offers",
    privacyNote: "Your information is secure and will not be shared with any external party",
    button: "Continue",
    sending: "Sending...",
    success: "Information Submitted Successfully",
    empty: "Please enter email and phone number",
    invalidEmail: "Please enter a valid email address",
    invalidPhone: "Phone number must contain digits only and be 6 to 15 digits",
    error: "Something went wrong. Please try again"
  }
};

const phoneInput = document.querySelector("#phone");

const iti = window.intlTelInput(phoneInput, {
  initialCountry: "sa",
  preferredCountries: ["sa", "ae", "kw", "qa", "bh", "om", "eg"],
  separateDialCode: true,
  nationalMode: true,
  formatAsYouType: false
});

phoneInput.addEventListener("input", function() {
  this.value = this.value.replace(/\D/g, "").slice(0, 15);
});


phoneInput.addEventListener("open:countrydropdown", function() {
  document.body.classList.add("country-dropdown-open");
});

phoneInput.addEventListener("close:countrydropdown", function() {
  document.body.classList.remove("country-dropdown-open");
});


function setLanguage(lang) {
  currentLanguage = lang;
  localStorage.setItem("customer_form_lang", lang);

  document.documentElement.dir = "rtl";
  document.documentElement.lang = t[lang].lang;

  document.getElementById("title").innerText = t[lang].title;
  document.getElementById("subtitle").innerText = t[lang].subtitle;
  document.getElementById("emailLabel").innerHTML = '<span class="label-icon">✉</span> ' + t[lang].emailLabel;
  document.getElementById("phoneLabel").innerHTML = '<span class="label-icon">☎</span> ' + t[lang].phoneLabel;
  document.getElementById("phoneNote").innerText = t[lang].phoneNote;
  document.getElementById("promoNote").innerHTML = '<span class="promo-icon">📣</span><span>' + t[lang].promoNote + '</span>';
  document.getElementById("privacyNote").innerHTML = '<span class="lock-icon">🔒</span><span>' + t[lang].privacyNote + '</span>';
  document.getElementById("submitBtn").innerText = t[lang].button;

  document.getElementById("arBtn").classList.toggle("active", lang === "ar");
  document.getElementById("enBtn").classList.toggle("active", lang === "en");

  clearMessage();
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function isValidGeneralPhone(phone) {
  return /^\d{6,15}$/.test(phone);
}

function showMessage(message, type) {
  const msg = document.getElementById("msg");
  msg.innerText = message;
  msg.className = type;
}

function clearMessage() {
  const msg = document.getElementById("msg");
  msg.innerText = "";
  msg.className = "";
}

document.getElementById("customerForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const localPhone = phoneInput.value.replace(/\D/g, "");
  const btn = document.getElementById("submitBtn");

  if (!email || !localPhone) {
    showMessage(t[currentLanguage].empty, "error");
    return;
  }

  if (!isValidEmail(email)) {
    showMessage(t[currentLanguage].invalidEmail, "error");
    return;
  }

  if (!isValidGeneralPhone(localPhone)) {
    showMessage(t[currentLanguage].invalidPhone, "error");
    return;
  }

  const countryData = iti.getSelectedCountryData();
  const countryCode = "+" + countryData.dialCode;
  const fullPhone = countryCode + localPhone;
  const countryName = countryData.name;
  const countryIso = countryData.iso2.toUpperCase();

  btn.disabled = true;
  btn.innerText = t[currentLanguage].sending;
  clearMessage();

  fetch(WEBAPP_URL, {
    method: "POST",
    body: JSON.stringify({
      email: email,
      countryCode: countryCode,
      phone: localPhone,
      fullPhone: fullPhone,
      countryName: countryName,
      countryIso: countryIso,
      language: currentLanguage === "ar" ? "Arabic" : "English"
    })
  })
  .then(function(response) {
    if (!response.ok) throw new Error("Network error");
    return response.text();
  })
  .then(function() {
    showMessage(t[currentLanguage].success, "success");
    document.getElementById("email").value = "";
    phoneInput.value = "";
  })
  .catch(function() {
    showMessage(t[currentLanguage].error, "error");
  })
  .finally(function() {
    btn.disabled = false;
    btn.innerText = t[currentLanguage].button;
  });
});

setLanguage(currentLanguage);
</script>

</body>
</html>
